<!DOCTYPE html>
<html>
	<head>
		<title>Simple Calculator</title>
		<link rel="shortcut icon" href="calculator_icon.png" type="image/x-icon">
		<link rel="stylesheet" href="Style.css">
	</head>
	<body>
		<!-- Calculator wrapper -->
		<div id="calculator_wrap">
			<div id="header">
				<div id="calculator_icon"></div>
				<div id="heading">Calculator</div>
			</div>

			<div id="calc_result"></div>

			<div id="calculation">0</div>

			<div id="calc_button_wrap">
				<buton class="calc_button" onclick="press('%')"> % </buton>
				<buton class="calc_button" onclick="clearEntry()"> CE </buton>
				<buton class="calc_button" onclick="clearAll()"> C </buton>
				<buton class="calc_button" onclick="backspace()"> ← </buton>
				<buton class="calc_button" onclick="press('1/x')"> 1/x </buton>
				<buton class="calc_button" onclick="press('x^2')"> x<sup>2</sup> </buton>
				<buton class="calc_button" onclick="press('√')"> &radic;x </buton>
				<buton class="calc_button" onclick="press('/')"> ÷ </buton>
				<buton class="calc_button" onclick="press('7')"> 7 </buton>
				<buton class="calc_button" onclick="press('8')"> 8 </buton>
				<buton class="calc_button" onclick="press('9')"> 9 </buton>
				<buton class="calc_button" onclick="press('*')"> X </buton>
				<buton class="calc_button" onclick="press('4')"> 4 </buton>
				<buton class="calc_button" onclick="press('5')"> 5 </buton>
				<buton class="calc_button" onclick="press('6')"> 6 </buton>
				<buton class="calc_button" onclick="press('-')"> - </buton>
				<buton class="calc_button" onclick="press('1')"> 1 </buton>
				<buton class="calc_button" onclick="press('2')"> 2 </buton>
				<buton class="calc_button" onclick="press('3')"> 3 </buton>
				<buton class="calc_button" onclick="press('+')"> + </buton>
				<buton class="calc_button" onclick="press('+/-')"> +/- </buton>
				<buton class="calc_button" onclick="press('0')"> 0 </buton>
				<buton class="calc_button" onclick="press('.')"> . </buton>
				<buton class="calc_button_equal" onclick="calculate()" > = </buton>
			</div>
		</div>

		<script>
			let currentInput = '0';
			let previousInput = '';
			let operator = '';
			let preCalc=document.getElementById('calc_result');

			function updateDisplay()
			{
      			document.getElementById('calculation').innerHTML = currentInput;
			}

			function press(value)
			{
				if(!isNaN(value) || value === '.')
				{
					if (currentInput === '0')
					{
						currentInput = value;
					} 
					else
					{
						currentInput += value;
					}
				}
				else if(value === '+/-')
				{
					currentInput = (parseFloat(currentInput) * -1);
				}
				else if(value === '1/x')
				{
					currentInput = (1 / parseFloat(currentInput));
					preCalc.innerHTML=`Result of ( 1/${1 / parseFloat(currentInput)} ) is`;
				}
				else if(value === 'x^2')
				{
					currentInput = Math.pow(parseFloat(currentInput), 2);
					preCalc.innerHTML=`Result of ( ${Math.sqrt(parseFloat(currentInput))}<sup>2</sup> ) is`;
				}
				else if(value === '√')
				{
					currentInput = Math.sqrt(parseFloat(currentInput));
					preCalc.innerHTML=`Result of ( &radic;${Math.pow(parseFloat(currentInput), 2)} ) is`;
				}
				else
				{
					operator = value;
					previousInput = currentInput;
					currentInput = '0';
				}
				updateDisplay();
			}

			function calculate()
			{
				let result = 0;
				const prev = parseFloat(previousInput);
				const curr = parseFloat(currentInput);

				switch(operator)
				{
					case '+':
						result = prev + curr;
						preCalc.innerHTML=`Result of ( ${prev} + ${curr} ) is`;
						break;
					case '-':
						result = prev - curr;
						preCalc.innerHTML=`Result of ( ${prev} - ${curr} ) is`;
						break;
					case '*':
						result = prev * curr;
						preCalc.innerHTML=`Result of ( ${prev} X ${curr} ) is`;
						break;
					case '/':
						result = curr === 0 ? 'Error' : prev / curr;
						preCalc.innerHTML=`Result of ( ${prev} ÷ ${curr} ) is`;
						break;
					case '%':
						result = prev % curr;
						preCalc.innerHTML=`Result of ( ${prev} % ${curr} ) is`;
						break;
				}

				currentInput = result;
				operator = '';
				previousInput = '';
				updateDisplay();
			}

			function clearAll()
			{
				currentInput = '0';
				previousInput = '';
				operator = '';
				preCalc.innerHTML='';
				updateDisplay();
			}

			function clearEntry()
			{
				currentInput = '0';
				updateDisplay();
			}

			function backspace()
			{
				currentInput = currentInput.slice(0, -1) || '0';
				updateDisplay();
			}
		</script>
	</body>
</html>
